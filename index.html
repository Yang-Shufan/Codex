<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>统计冒险学院 · 章节地图</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>🗺️ 统计冒险学院：章节地图</h1>
      <p>你提到“单页堆参数太难”，所以我把它完全重构成 <strong>独立关卡页面</strong>。你现在只需要按顺序闯关。</p>
      <div class="topbar">
        <span class="badge">已解锁章节：<span id="unlocked">1</span>/4</span>
        <span class="badge">徽章：<span id="badges">0</span></span>
        <span class="badge">经验：<span id="xp">0</span></span>
      </div>
      <div class="progress"><div id="bar"></div></div>
      <button class="warn" id="reset">清空进度重来</button>
    </div>

    <div class="grid two">
      <div class="card">
        <h3>第1关：均值差侦察队</h3>
        <p>无参数，先理解“处理组均值 - 对照组均值”的直觉。</p>
        <a class="link" href="chapters/ch1.html">进入第1关 →</a>
      </div>
      <div class="card">
        <h3>第2关：样本量工坊</h3>
        <p>你只做一个决策：选小样本 / 大样本，观察稳定性差异。</p>
        <a class="link" id="go2" href="#">未解锁</a>
      </div>
      <div class="card">
        <h3>第3关：混杂偏误法庭</h3>
        <p>看起来有效，真的有效吗？在法庭上找出偏误来源。</p>
        <a class="link" id="go3" href="#">未解锁</a>
      </div>
      <div class="card">
        <h3>第4关：回归救援战</h3>
        <p>同一数据下比较 ATÊ 与 β₁，完成最终校正任务。</p>
        <a class="link" id="go4" href="#">未解锁</a>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    const s = GameCore.getState();
    document.getElementById('unlocked').textContent = s.unlocked;
    document.getElementById('badges').textContent = s.badges;
    document.getElementById('xp').textContent = s.xp;
    document.getElementById('bar').style.width = `${Math.min(100, s.unlocked / 4 * 100)}%`;

    function unlockLink(id, chapter) {
      const el = document.getElementById(id);
      if (s.unlocked >= chapter) {
        el.textContent = `进入第${chapter}关 →`;
        el.href = `chapters/ch${chapter}.html`;
      }
    }
    unlockLink('go2', 2); unlockLink('go3', 3); unlockLink('go4', 4);

    document.getElementById('reset').addEventListener('click', () => {
      GameCore.resetState();
      location.reload();
    });
  </script>
</body>
</html>
