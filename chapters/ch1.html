<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>第1关</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="container"><div class="panel"><h1>第1关：列表实验是什么？</h1><p>目标：建立第一性理解——为什么“只报数量”能降低敏感题低报。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
  <div class="grid two">
    <div class="control"><label>敏感程度（越高越容易撒谎）：<span id="lieV">0.40</span></label><input id="lie" type="range" min="0" max="0.8" step="0.05" value="0.4"></div>
    <div class="control"><label>样本量 N：<span id="nV">500</span></label><input id="n" type="range" min="200" max="1200" step="100" value="500"></div>
  </div>
  <button class="primary" id="run">运行比较实验</button><button class="success" id="pass" disabled>提交通关</button>
  <div id="bars" class="bar-wrap"></div><div id="out" class="log"></div>
</div></div>
<script src="../app.js"></script><script>
const n=document.getElementById('n'), lie=document.getElementById('lie');
const nV=document.getElementById('nV'), lieV=document.getElementById('lieV');
[n,lie].forEach(el=>el.oninput=()=>{nV.textContent=n.value;lieV.textContent=Number(lie.value).toFixed(2);});
const bars=document.getElementById('bars'), out=document.getElementById('out'); let passReady=false;
const row=(name,val)=>`<div class='row'><div>${name}</div><div class='track'><div class='fill' style='width:${Math.max(0,Math.min(1,val))*100}%'></div></div><div class='mono'>${(val*100).toFixed(1)}%</div></div>`;
document.getElementById('run').onclick=()=>{
  const rows=ListCore.simulateListExperiment({n:+n.value,directLieProb:+lie.value});
  const truth=ListCore.truthMean(rows), direct=ListCore.directMean(rows), dim=ListCore.diffInMeans(rows).est;
  bars.innerHTML=row('真实敏感比例',truth)+row('直接提问',direct)+row('列表实验(DIM)',dim);
  const errD=Math.abs(direct-truth), errL=Math.abs(dim-truth);
  passReady=errL<errD; document.getElementById('pass').disabled=false;
  out.innerHTML=`<div>误差：直接提问 ${errD.toFixed(3)} vs 列表实验 ${errL.toFixed(3)}</div><div class='note'>看趋势而非单次：通常敏感程度越高，直接提问低报越明显。</div><div class='${passReady?'ok':'warnText'}'>${passReady?'本轮已看到列表实验优势':'本轮噪声较大，建议再跑1-2次确认趋势'}</div>`;
  ListCore.updateProgress({xp:8,stars:1});
};
document.getElementById('pass').onclick=()=>{
  if(!passReady){out.innerHTML=`<div class='warnText'>请先跑到一次“列表实验更接近真实值”再提交。</div>`+out.innerHTML;return;}
  ListCore.updateProgress({xp:30,stars:3,badge:true,unlock:2});
  out.innerHTML=`<div class='ok'>✅ 通关！已解锁第2关。</div>`+out.innerHTML;
};
</script></body></html>
