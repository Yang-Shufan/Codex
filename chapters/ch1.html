<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>第1关</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="container">
<div class="panel"><h1>第1关：什么是列表实验？</h1><p>你将看到：直接提问会因社会期望偏误低估敏感态度；列表实验通过“只报数量”缓解这个问题。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
  <button class="primary" id="run">生成一组样本（N=500）</button>
  <button class="success" id="pass" disabled>我理解了：列表实验估计更接近真实值</button>
  <div class="bar-wrap" id="bars"></div>
  <div id="txt" class="log"></div>
</div>
</div>
<script src="../app.js"></script>
<script>
const bars=document.getElementById('bars');const txt=document.getElementById('txt');
let good=false;
function barRow(name,val){
  return `<div class='row'><div>${name}</div><div class='track'><div class='fill' style='width:${(val*100).toFixed(1)}%'></div></div><div class='mono'>${(val*100).toFixed(1)}%</div></div>`;
}

document.getElementById('run').onclick=()=>{
  const rows=ListCore.simulateListExperiment({n:500,directLieProb:0.45,treatmentBias:0});
  const truth=ListCore.truthMean(rows); const direct=ListCore.directMean(rows); const dim=ListCore.listDiffInMeans(rows);
  bars.innerHTML = barRow('真实敏感比例',truth)+barRow('直接提问均值',direct)+barRow('列表实验均值差',dim);
  const errD=Math.abs(direct-truth), errL=Math.abs(dim-truth);
  good = errL < errD;
  txt.innerHTML = `<div>真实值=${truth.toFixed(3)}；直接提问=${direct.toFixed(3)}；列表实验(DIM)=${dim.toFixed(3)}</div>
  <div class='note'>解释：直接提问里一部分“真实为1”的人会因顾虑而报0；列表实验只报数量，隐私更强。</div>
  <div class='${good?'ok':'warnText'}'>本轮判断：${good?'列表实验更接近真实值':'这轮噪声较大，重跑再看整体趋势'}。</div>`;
  document.getElementById('pass').disabled=false;
};

document.getElementById('pass').onclick=()=>{
  if(!good){txt.innerHTML = `<div class='warnText'>请至少先跑到一次“列表实验更接近真实值”再通关，这样你会更直观。</div>`+txt.innerHTML;return;}
  ListCore.updateProgress(30,true,2);
  txt.innerHTML = `<div class='ok'>✅ 通关成功：你已理解列表实验动机，解锁第2关。</div>`+txt.innerHTML;
};
</script>
</body></html>
