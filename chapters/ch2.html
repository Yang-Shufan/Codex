<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>第2关</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="container"><div class="panel"><h1>第2关：差均值估计量与抽样分布</h1><p>目标：理解“单次会波动，但重复后中心靠近真实值”。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
  <div class="grid two">
    <div class="control"><label>每次实验样本量 N：<span id="nV">250</span></label><input id="n" type="range" min="120" max="800" step="20" value="250"></div>
    <div class="control"><label>重复次数 R：<span id="rV">120</span></label><input id="r" type="range" min="40" max="300" step="20" value="120"></div>
  </div>
  <button class="primary" id="run">生成抽样分布</button><button class="success" id="pass" disabled>提交通关</button>
  <div id="hist" class="bar-wrap"></div><div id="out" class="log"></div>
</div></div>
<script src="../app.js"></script><script>
if(ListCore.getState().unlocked<2) location.href='../index.html';
const n=document.getElementById('n'), r=document.getElementById('r'), nV=document.getElementById('nV'), rV=document.getElementById('rV');
[n,r].forEach(e=>e.oninput=()=>{nV.textContent=n.value;rV.textContent=r.value;});
const hist=document.getElementById('hist'), out=document.getElementById('out'); let good=false;
const bucket=v=>Math.max(0,Math.min(9,Math.floor(v*10)));
document.getElementById('run').onclick=()=>{
  const R=+r.value, N=+n.value, bins=Array(10).fill(0), est=[], tr=[];
  for(let i=0;i<R;i++){const rows=ListCore.simulateListExperiment({n:N,directLieProb:0.35});const d=ListCore.diffInMeans(rows).est,t=ListCore.truthMean(rows);bins[bucket(d)]++;est.push(d);tr.push(t);}  
  const mEst=est.reduce((a,b)=>a+b,0)/R, mTr=tr.reduce((a,b)=>a+b,0)/R;
  hist.innerHTML=bins.map((b,i)=>`<div class='row'><div>${(i/10).toFixed(1)}-${((i+1)/10).toFixed(1)}</div><div class='track'><div class='fill' style='width:${(b/R*100).toFixed(1)}%'></div></div><div>${b}</div></div>`).join('');
  good=Math.abs(mEst-mTr)<0.03;
  out.innerHTML=`<div>中心比较：平均DIM=${mEst.toFixed(3)}；平均真实值=${mTr.toFixed(3)}</div><div class='note'>N越大、R越多，你越容易看清“估计量长期行为”。</div><div class='${good?'ok':'warnText'}'>${good?'已满足通关条件':'继续增大N或R再试一次'}</div>`;
  document.getElementById('pass').disabled=false; ListCore.updateProgress({xp:10,stars:1});
};
document.getElementById('pass').onclick=()=>{if(!good){out.innerHTML=`<div class='warnText'>请先达到条件再提交。</div>`+out.innerHTML;return;} ListCore.updateProgress({xp:35,stars:3,badge:true,unlock:3}); out.innerHTML=`<div class='ok'>✅ 通关！已解锁第3关。</div>`+out.innerHTML;};
</script></body></html>
