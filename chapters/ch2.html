<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>第2关</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="container">
<div class="panel"><h1>第2关：均值差估计量与重复抽样</h1><p>任务：观察 120 次重复实验后，抽样分布中心是否靠近真实比例。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
  <button class="primary" id="run120">运行120次模拟（N=250）</button>
  <div class="bar-wrap" id="hist"></div>
  <div id="out" class="log"></div>
</div>
</div>
<script src="../app.js"></script>
<script>
if(ListCore.getState().unlocked<2) location.href='../index.html';
const hist=document.getElementById('hist'); const out=document.getElementById('out');
function bucket(v){return Math.max(0,Math.min(9,Math.floor(v*10)));}

document.getElementById('run120').onclick=()=>{
  const bins=Array(10).fill(0); const est=[]; const trueVals=[];
  for(let i=0;i<120;i++){
    const rows=ListCore.simulateListExperiment({n:250,directLieProb:0.35});
    const d=ListCore.listDiffInMeans(rows), t=ListCore.truthMean(rows);
    bins[bucket(d)]++; est.push(d); trueVals.push(t);
  }
  const mEst=est.reduce((a,b)=>a+b,0)/est.length;
  const mTrue=trueVals.reduce((a,b)=>a+b,0)/trueVals.length;
  hist.innerHTML=bins.map((b,i)=>`<div class='row'><div>${(i/10).toFixed(1)}-${((i+1)/10).toFixed(1)}</div><div class='track'><div class='fill' style='width:${(b/120*100).toFixed(1)}%'></div></div><div>${b}</div></div>`).join('');
  const ok=Math.abs(mEst-mTrue)<0.03;
  out.innerHTML=`<div>120次平均估计=${mEst.toFixed(3)}；120次平均真实值=${mTrue.toFixed(3)}</div>
  <div class='note'>这就是“差均值估计量”在随机分配下的核心直觉：重复实验后中心对齐真实值，但单次会波动。</div>
  <div class='${ok?'ok':'warnText'}'>${ok?'✅ 任务完成：你观察到了抽样分布围绕真实值。':'⚠️ 本次噪声偏大，可再运行一次确认。'}</div>`;
  if(ok){ListCore.updateProgress(35,true,3);} else {ListCore.updateProgress(10,false,null);}  
}
</script>
</body></html>
