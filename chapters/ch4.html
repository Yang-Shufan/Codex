<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>第4关</title><link rel="stylesheet" href="../styles.css" /></head>
<body><div class="container">
<div class="panel"><h1>第4关 · 回归救援战（终章）</h1><p>任务：在同一批数据上，让“回归 β₁ 比 ATÊ 更接近真实 τ”成功 2 次，完成毕业。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
  <button class="primary" id="run">生成高混杂数据</button>
  <button class="success" id="useReg" disabled>使用回归控制能力变量</button>
  <div id="out" class="log"></div>
</div></div>
<script src="../app.js"></script>
<script>
const s = GameCore.getState();
if (s.unlocked < 4) location.href = '../index.html';
let latest = null, success = 0;
const out = document.getElementById('out');
function log(t){ out.innerHTML = `<div>${t}</div>` + out.innerHTML; }

document.getElementById('run').onclick = ()=>{
  const tau = 2;
  const sample = GameCore.generateSample({n:140,tau,sigma:7,conf:4.2,confounded:true});
  const dim = GameCore.diffInMeans(sample.y, sample.d);
  latest = { tau, sample, dim };
  log(`裸估计：ATÊ=${dim.ate.toFixed(2)}，真实 τ=2.00，误差=${Math.abs(dim.ate-tau).toFixed(2)}`);
  document.getElementById('useReg').disabled = false;
};

document.getElementById('useReg').onclick = ()=>{
  if(!latest) return;
  const reg = GameCore.regressYOnDX(latest.sample.y, latest.sample.d, latest.sample.x);
  const errAte = Math.abs(latest.dim.ate - latest.tau);
  const errReg = Math.abs(reg.b1 - latest.tau);
  const better = errReg < errAte;
  log(`回归后：β₁=${reg.b1.toFixed(2)}，误差=${errReg.toFixed(2)}（ATÊ误差=${errAte.toFixed(2)}）`);
  if (better) {
    success += 1;
    GameCore.updateProgress(15,false,null);
    log(`<span class='ok'>✅ 回归修正成功 ${success}/2</span>`);
  } else {
    log(`<span class='warnText'>这次改进不明显，再试一批数据。</span>`);
  }
  if (success >= 2) {
    GameCore.updateProgress(50,true,4);
    log(`<span class='ok'>🏆 毕业成功！你已经完成“均值差→混杂偏误→回归修正”的全路径。</span>`);
  }
};
</script>
</body></html>
