<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>第3关</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="container">
<div class="panel"><h1>第3关：关键假设与违背检测</h1><p>对应 Blair & Imai (2012)：无设计效应、无谎言。你将可视化看到违背时会发生什么。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
  <button class="primary" id="clean">场景A：假设基本成立</button>
  <button class="secondary" id="violate">场景B：设计效应 + 更高谎报</button>
  <div id="dist" class="bar-wrap"></div>
  <div id="out" class="log"></div>
</div>
</div>
<script src="../app.js"></script>
<script>
if(ListCore.getState().unlocked<3) location.href='../index.html';
const dist=document.getElementById('dist');const out=document.getElementById('out');
function run(mode){
  const bad=mode==='bad';
  const rows=ListCore.simulateListExperiment({n:700,directLieProb:bad?0.6:0.3,designEffect:bad?1.0:0});
  const p=ListCore.distByGroup(rows,'yList',5);
  dist.innerHTML = p.t.map((v,i)=>`<div class='row'><div>Y=${i}</div><div class='track'><div class='fill' style='width:${Math.max(v,p.c[i])*100}%'></div></div><div class='mono'>T:${(v*100).toFixed(1)}% / C:${(p.c[i]*100).toFixed(1)}%</div></div>`).join('');

  const checkLow = p.t[0] <= p.c[0];
  const checkHigh = p.t[5] >= p.c[4];
  const flag = !(checkLow && checkHigh);
  out.innerHTML = `<div>检查1（低端随机优势）：P(Y=0|T=1) ≤ P(Y=0|T=0) ? ${checkLow?'是':'否'}</div>
  <div>检查2（高端随机优势）：P(Y=J+1|T=1) ≥ P(Y=J|T=0) ? ${checkHigh?'是':'否'}</div>
  <div class='note'>这是一种教学化近似检查：正式论文中使用更完整的随机优势检验与校正。</div>
  <div class='${flag?'warnText':'ok'}'>${flag?'检测到可疑违背信号：需谨慎解释结果。':'未见明显违背信号。'}</div>`;
  if (!bad && !flag) { ListCore.updateProgress(30,true,4); }
  else { ListCore.updateProgress(12,false,null); }
}
document.getElementById('clean').onclick=()=>run('clean');
document.getElementById('violate').onclick=()=>run('bad');
</script>
</body></html>
