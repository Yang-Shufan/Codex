<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>第3关</title><link rel="stylesheet" href="../styles.css"/></head>
<body><div class="container"><div class="panel"><h1>第3关：关键假设与诊断</h1><p>目标：系统理解无设计效应、无谎言及天花板/地板效应对估计的影响。</p><a class="link" href="../index.html">← 返回地图</a></div>
<div class="panel">
<div class="grid two">
  <div class="control"><label>设计效应强度：<span id="deV">0.00</span></label><input id="de" type="range" min="0" max="1.2" step="0.1" value="0"></div>
  <div class="control"><label>直接提问谎报率：<span id="liV">0.30</span></label><input id="li" type="range" min="0" max="0.8" step="0.05" value="0.3"></div>
  <div class="control"><label>天花板谎报：<span id="ceV">0.00</span></label><input id="ce" type="range" min="0" max="0.8" step="0.05" value="0"></div>
  <div class="control"><label>地板谎报：<span id="flV">0.00</span></label><input id="fl" type="range" min="0" max="0.8" step="0.05" value="0"></div>
</div>
<button class="primary" id="run">运行诊断</button><button class="success" id="pass" disabled>提交通关</button>
<div id="dist" class="bar-wrap"></div><div id="out" class="log"></div>
</div></div>
<script src="../app.js"></script><script>
if(ListCore.getState().unlocked<3) location.href='../index.html';
const ids=['de','li','ce','fl']; ids.forEach(id=>{const el=document.getElementById(id),v=document.getElementById(id+'V');el.oninput=()=>v.textContent=Number(el.value).toFixed(2);});
const dist=document.getElementById('dist'), out=document.getElementById('out'); let good=false;
document.getElementById('run').onclick=()=>{
 const rows=ListCore.simulateListExperiment({n:800,designEffect:+de.value,directLieProb:+li.value,ceilingLie:+ce.value,floorLie:+fl.value});
 const p=ListCore.distByGroup(rows,'yList',5); const dim=ListCore.diffInMeans(rows).est, tr=ListCore.truthMean(rows);
 dist.innerHTML=p.t.map((v,i)=>`<div class='row'><div>Y=${i}</div><div class='track'><div class='fill' style='width:${Math.max(v,p.c[i])*100}%'></div></div><div class='mono'>T:${(v*100).toFixed(1)} C:${(p.c[i]*100).toFixed(1)}</div></div>`).join('');
 const checkLow=p.t[0]<=p.c[0], checkHigh=p.t[5]>=p.c[4], signal=!(checkLow&&checkHigh);
 good = signal && Math.abs(dim-tr)>0.05;
 out.innerHTML=`<div>DIM=${dim.toFixed(3)}，真实=${tr.toFixed(3)}，偏差=${Math.abs(dim-tr).toFixed(3)}</div><div>诊断信号：低端约束${checkLow?'满足':'破坏'}；高端约束${checkHigh?'满足':'破坏'}</div><div class='note'>你可以把参数拉高，主动制造假设违背，再观察估计变化。</div><div class='${good?'ok':'warnText'}'>${good?'你已成功识别“假设违背→估计风险”':'建议继续调高设计效应/天花板或地板谎报，再运行一次'}</div>`;
 document.getElementById('pass').disabled=false; ListCore.updateProgress({xp:12,stars:1});
}
document.getElementById('pass').onclick=()=>{if(!good){out.innerHTML=`<div class='warnText'>请先触发一次清晰的违背信号再提交。</div>`+out.innerHTML;return;} ListCore.updateProgress({xp:40,stars:4,badge:true,unlock:4}); out.innerHTML=`<div class='ok'>✅ 通关！已解锁第4关。</div>`+out.innerHTML;};
</script></body></html>
